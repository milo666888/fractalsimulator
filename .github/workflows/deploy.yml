name: Deploy to GitHub Pages

on:
  # 當程式碼推送到 main 分支時自動觸發
  push:
    branches: ["main"]
  # 允許手動從 GitHub 介面觸發
  workflow_dispatch:

# 設定 GitHub Pages 所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 確保同一時間只有一個部署任務在執行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
